{% extends 'base.html' %}
{% block contents %}
<style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; padding: 40px 0; }
    .auth-card { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 24px; overflow: hidden; background: white; box-shadow: var(--shadow-lg); }
    .auth-form-container { flex: 1; padding: 40px; background: white; }
    .form-control.premium-input { border-radius: 12px; padding: 12px 15px; height: auto; font-size: 0.9rem; }
    .btn-premium { background: #4f46e5; color: white; border-radius: 12px; border: none; font-weight: 600; transition: all 0.3s ease; }
    .btn-premium:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); color: white; }
    .password-toggle { cursor: pointer; background: transparent; border: 1px solid #e2e8f0; border-left: none; border-radius: 0 12px 12px 0; padding: 0 12px; display: flex; align-items: center; color: #94a3b8; }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card premium-card animate-up">
            <div class="auth-form-container w-100">
                <div class="text-center mb-4">
                    <h4 class="font-weight-bold">Reset Password</h4>
                    <p class="text-muted extra-small">Create a strong new password</p>
                </div>

                <form method="POST" action="{% url 'ResetPassword' %}">
                    {% csrf_token %}
                    
                    <div class="form-group mb-3">
                        <label class="extra-small font-weight-bold text-muted ml-1">NEW PASSWORD</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-transparent border-right-0 py-0" style="border-radius: 12px 0 0 12px;"><i class="fas fa-lock text-muted small"></i></span>
                            </div>
                            <input type="password" name="new_password" id="newPasswordInput" class="form-control premium-input border-right-0 border-left-0" style="border-radius: 0;" placeholder="••••••••" required minlength="6">
                            <div class="input-group-append">
                                <span class="password-toggle" onclick="togglePassword('newPasswordInput', 'eyeIcon1')">
                                    <i class="fas fa-eye small" id="eyeIcon1"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="extra-small font-weight-bold text-muted ml-1">CONFIRM PASSWORD</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-transparent border-right-0 py-0" style="border-radius: 12px 0 0 12px;"><i class="fas fa-lock text-muted small"></i></span>
                            </div>
                            <input type="password" name="confirm_password" id="confirmPasswordInput" class="form-control premium-input border-right-0 border-left-0" style="border-radius: 0;" placeholder="••••••••" required minlength="6">
                            <div class="input-group-append">
                                <span class="password-toggle" onclick="togglePassword('confirmPasswordInput', 'eyeIcon2')">
                                    <i class="fas fa-eye small" id="eyeIcon2"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-premium w-100 py-2 mb-3">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
