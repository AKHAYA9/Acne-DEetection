{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        padding: 40px 0;
    }

    .auth-card {
        display: flex;
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        border-radius: 16px;
        overflow: hidden;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-lg);
    }

    .auth-form-container {
        flex: 1;
        padding: 40px;
        background: transparent;
    }

    .form-control.premium-input {
        border-radius: 12px;
        padding: 11px 15px;
        height: auto;
        font-size: 0.85rem;
        color: var(--text-main);
    }

    /* Ensure typed text is always visible in light theme */
    body.light-theme .form-control.premium-input {
        color: #1e293b !important;
        background-color: #ffffff !important;
    }

    body.light-theme .input-group-text {
        color: #64748b !important;
        background-color: transparent !important;
    }

    body.light-theme .form-control.premium-input::placeholder {
        color: #94a3b8 !important;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .password-toggle {
        cursor: pointer;
        background: transparent;
        border: 1px solid var(--border-color);
        border-left: none;
        border-radius: 0 12px 12px 0;
        padding: 0 15px;
        display: flex;
        align-items: center;
        color: var(--text-muted);
    }

    body.light-theme .password-toggle {
        border-color: #cbd5e1;
        color: #64748b;
    }

    /* Submit Button styling */
    .btn-submit {
        background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        border: none;
        color: #ffffff;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        border-radius: 12px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        color: #ffffff;
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card premium-card animate-up mx-auto">
            <div class="auth-form-container w-100">
                <div class="mb-4 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: rgba(255, 255, 255, 0.03); color: var(--brand-secondary); border: 1px solid var(--border-color);">
                        <i class="fas fa-lock-open fa-2x"></i>
                    </div>
                    <h4 class="font-weight-bold">Reset Password</h4>
                    <p class="text-muted extra-small">Create a strong new password</p>
                </div>

                <form method="POST" action="{% url 'ResetPassword' %}">
                    {% csrf_token %}
                    
                    <div class="form-group mb-3">
                        <label class="extra-small font-weight-bold text-muted ml-1">NEW PASSWORD</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-transparent border-right-0 py-0" style="border-radius: 12px 0 0 12px;"><i class="fas fa-lock text-muted small"></i></span>
                            </div>
                            <input type="password" name="new_password" id="newPasswordInput" class="form-control premium-input border-right-0 border-left-0" style="border-radius: 0;" placeholder="••••••••" required minlength="6">
                            <div class="input-group-append">
                                <span class="password-toggle" onclick="togglePassword('newPasswordInput', 'eyeIcon1')">
                                    <i class="fas fa-eye small" id="eyeIcon1"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="extra-small font-weight-bold text-muted ml-1">CONFIRM PASSWORD</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-transparent border-right-0 py-0" style="border-radius: 12px 0 0 12px;"><i class="fas fa-lock text-muted small"></i></span>
                            </div>
                            <input type="password" name="confirm_password" id="confirmPasswordInput" class="form-control premium-input border-right-0 border-left-0" style="border-radius: 0;" placeholder="••••••••" required minlength="6">
                            <div class="input-group-append">
                                <span class="password-toggle" onclick="togglePassword('confirmPasswordInput', 'eyeIcon2')">
                                    <i class="fas fa-eye small" id="eyeIcon2"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit w-100 py-3 mb-3">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
