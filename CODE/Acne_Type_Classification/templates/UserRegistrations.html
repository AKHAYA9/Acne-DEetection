{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-container {
        min-height: 90vh;
        display: flex;
        align-items: center;
        padding: 50px 0;
        background-color: var(--bg-main);
    }

    .auth-card {
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        border-radius: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
    }

    .auth-form-container {
        padding: 40px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label-formal {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: block;
    }

    .input-group-formal {
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 2px 14px;
        transition: all 0.25s ease;
    }

    body.light-theme .input-group-formal {
        background: #ffffff;
        border-color: #cbd5e1;
    }

    .input-group-formal:focus-within {
        border-color: #0080ff;
        box-shadow: 0 0 0 3px rgba(0, 128, 255, 0.12);
    }

    .input-group-formal i {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .input-group-formal .form-control-formal {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        color: var(--text-main) !important;
        outline: none !important;
        width: 100%;
        font-size: 0.9rem;
        padding: 12px 10px !important;
        height: auto !important;
    }

    body.light-theme .input-group-formal .form-control-formal {
        color: #1e293b !important;
    }

    /* Password eye toggle */
    .password-toggle {
        cursor: pointer;
        color: var(--text-muted);
        padding-left: 8px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
    }

    .password-toggle:hover {
        color: var(--text-main);
    }

    /* Formal Buttons */
    .btn-submit-formal {
        background: #0080ff;
        color: #ffffff !important;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        border: none;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 4px 12px rgba(0, 128, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-submit-formal:hover {
        background: #0066cc;
        transform: translateY(-1.5px);
        box-shadow: 0 6px 16px rgba(0, 128, 255, 0.25);
    }

    /* Mobile Responsive Optimizations */
    @media (max-width: 576px) {
        .auth-container {
            padding: 24px 0;
            min-height: auto;
        }
        .auth-card {
            border-radius: 12px;
            margin: 0 10px;
            width: calc(100% - 20px);
        }
        .auth-form-container {
            padding: 24px 16px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .btn-submit-formal {
            padding: 12px;
        }
        .row > div {
            padding-left: 10px;
            padding-right: 10px;
        }
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card mx-auto">
            <div class="auth-form-container">
                <div class="mb-4 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: rgba(255, 255, 255, 0.03); color: #0080ff; border: 1px solid var(--border-color);">
                        <i class="fas fa-user-plus fa-2x"></i>
                    </div>
                    <h4 class="font-weight-bold" style="font-family: 'Outfit', sans-serif;">Create Account</h4>
                    <p class="text-muted extra-small">Join the skin health clinical analysis network</p>
                </div>

                <form action="{% url 'UserRegisterActions' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label-formal">Full Name</label>
                                <div class="input-group-formal">
                                    <i class="far fa-user"></i>
                                    <input type="text" name="name" class="form-control-formal" placeholder="Enter Full Name" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label-formal">Login ID</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-id-badge"></i>
                                    <input type="text" name="loginid" class="form-control-formal" placeholder="Enter Custom ID" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label-formal">Password</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" name="password" id="passwordInput" class="form-control-formal" placeholder="Choose a password" required minlength="6">
                                    <span class="password-toggle" onclick="togglePassword('passwordInput', this)">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label-formal">Mobile Number</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-mobile-alt"></i>
                                    <input type="text" name="mobile" id="mobileInput" class="form-control-formal" placeholder="Mobile Number" maxlength="10" pattern="[6-9][0-9]{9}" title="Mobile number must start with 6-9 and be exactly 10 digits" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label-formal">Email Address</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" name="email" class="form-control-formal" placeholder="example@gmail.com" pattern="[a-z0-9._%+-]+@gmail\.com$" title="Please enter a valid Gmail address" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label class="form-label-formal">City</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-city"></i>
                                    <input type="text" name="city" class="form-control-formal" placeholder="City" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label class="form-label-formal">State</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-map"></i>
                                    <input type="text" name="state" class="form-control-formal" placeholder="State" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="form-label-formal">Locality</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <input type="text" name="locality" class="form-control-formal" placeholder="Locality" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="form-group">
                                <label class="form-label-formal">Full Address</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-home"></i>
                                    <input type="text" name="address" class="form-control-formal" placeholder="Street Address" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="status" value="waiting">

                    <button type="submit" class="btn-submit-formal mt-3 py-3">Create Account</button>

                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">Already registered? <a href="{% url 'UserLogin' %}" class="text-primary font-weight-bold hover-underline">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, toggleEl) {
        const input = document.getElementById(inputId);
        const icon = toggleEl.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // Mobile Number Input constraints
    const mobileInput = document.getElementById('mobileInput');
    if (mobileInput) {
        mobileInput.addEventListener('input', function (e) {
            let val = this.value.replace(/\D/g, '');
            if (val.length > 0 && !['6', '7', '8', '9'].includes(val[0])) {
                val = '';
            }
            if (val.length > 10) {
                val = val.slice(0, 10);
            }
            this.value = val;
        });

        mobileInput.addEventListener('keypress', function (e) {
            if (e.which < 48 || e.which > 57) {
                e.preventDefault();
            }
        });
    }
</script>
{% endblock %}
