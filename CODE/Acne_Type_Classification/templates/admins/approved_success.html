{% extends 'admins/adminbase.html' %}
{% block contents %}
<div class="container py-5 text-center mt-5">
    <div class="premium-card p-5 d-inline-block shadow-lg" style="max-width: 500px;">
        <h2 class="text-success mb-3"><i class="fas fa-check-circle"></i> Approval Successful</h2>
        <p class="text-muted">You have successfully approved the account for <strong>{{ user.name }}</strong>.</p>
        <p class="text-muted small">An email notification has been sent to them with login instructions.</p>
        <a href="{% url 'AdminHome' %}" class="btn btn-primary mt-3">Return to Dashboard</a>
    </div>
</div>
{% endblock %}
