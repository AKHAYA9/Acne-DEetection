{% extends 'base.html' %}
{% block contents %}
<style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; padding: 40px 0; }
    .auth-card { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 24px; overflow: hidden; background: white; box-shadow: var(--shadow-lg); }
    .auth-form-container { flex: 1; padding: 40px; background: white; }
    .form-control.premium-input { border-radius: 12px; padding: 12px 15px; height: auto; font-size: 0.9rem; }
    .btn-premium { background: #4f46e5; color: white; border-radius: 12px; border: none; font-weight: 600; transition: all 0.3s ease; }
    .btn-premium:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); color: white; }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card premium-card animate-up">
            <div class="auth-form-container w-100">
                <div class="text-center mb-4">
                    <h4 class="font-weight-bold">Forgot Password</h4>
                    <p class="text-muted extra-small">Enter your registered email to receive an OTP</p>
                </div>

                <form method="POST" action="{% url 'ForgotPassword' %}">
                    {% csrf_token %}
                    
                    <div class="form-group mb-4">
                        <label class="extra-small font-weight-bold text-muted ml-1">EMAIL ADDRESS</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-transparent border-right-0 py-0" style="border-radius: 12px 0 0 12px;"><i class="fas fa-envelope text-muted small"></i></span>
                            </div>
                            <input type="email" name="email" class="form-control premium-input border-left-0" style="border-radius: 0 12px 12px 0;" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-premium w-100 py-2 mb-3">Send OTP</button>

                    <div class="text-center">
                        <a href="{% url 'UserLogin' %}" class="text-muted small"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
