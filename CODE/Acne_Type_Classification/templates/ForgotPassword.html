{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        padding: 60px 0;
        background-color: var(--bg-main);
    }

    .auth-card {
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
        border-radius: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
    }

    .auth-form-container {
        padding: 40px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-label-formal {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: block;
    }

    .input-group-formal {
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 2px 14px;
        transition: all 0.25s ease;
    }

    body.light-theme .input-group-formal {
        background: #ffffff;
        border-color: #cbd5e1;
    }

    .input-group-formal:focus-within {
        border-color: #0080ff;
        box-shadow: 0 0 0 3px rgba(0, 128, 255, 0.12);
    }

    .input-group-formal i {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .input-group-formal .form-control-formal {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        color: var(--text-main) !important;
        outline: none !important;
        width: 100%;
        font-size: 0.9rem;
        padding: 12px 10px !important;
        height: auto !important;
    }

    body.light-theme .input-group-formal .form-control-formal {
        color: #1e293b !important;
    }

    /* Formal Buttons */
    .btn-submit-formal {
        background: #0080ff;
        color: #ffffff !important;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        border: none;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 4px 12px rgba(0, 128, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-submit-formal:hover {
        background: #0066cc;
        transform: translateY(-1.5px);
        box-shadow: 0 6px 16px rgba(0, 128, 255, 0.25);
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card mx-auto">
            <div class="auth-form-container w-100">
                <div class="mb-4 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: rgba(255, 255, 255, 0.03); color: var(--brand-secondary); border: 1px solid var(--border-color);">
                        <i class="fas fa-key fa-2x"></i>
                    </div>
                    <h4 class="font-weight-bold" style="font-family: 'Outfit', sans-serif;">Forgot Password</h4>
                    <p class="text-muted extra-small">Enter your registered email address to request a reset link / OTP code</p>
                </div>

                <form method="POST" action="{% url 'ForgotPassword' %}">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label-formal">Email Address</label>
                        <div class="input-group-formal">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="email" class="form-control-formal" placeholder="example@gmail.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit-formal mt-4">
                        Send Recovery Code <i class="fas fa-paper-plane" style="font-size: 0.8rem;"></i>
                    </button>

                    <div class="text-center mt-4">
                        <a href="{% url 'UserLogin' %}" class="text-muted small text-decoration-none hover-underline"><i class="fas fa-arrow-left mr-1"></i> Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
