{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        padding: 60px 0;
        background-color: var(--bg-main);
        position: relative;
        overflow: hidden;
    }

    /* 3D Perspective Flip Container */
    .flip-container {
        perspective: 1500px;
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
        position: relative;
        z-index: 2;
    }

    .flip-card-inner {
        position: relative;
        width: 100%;
        height: 480px;
        transform-style: preserve-3d;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flip-card-inner.flipped {
        transform: rotateY(180deg);
    }

    /* Formal Glassmorphism Cards */
    .flip-card-front, .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-lg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
    }

    .flip-card-back {
        transform: rotateY(180deg);
    }

    .auth-form-container {
        padding: 40px;
    }

    /* Unified Form Elements */
    .form-group {
        margin-bottom: 20px;
    }

    .form-label-formal {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: block;
    }

    .input-group-formal {
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 2px 14px;
        transition: all 0.25s ease;
    }

    body.light-theme .input-group-formal {
        background: #ffffff;
        border-color: #cbd5e1;
    }

    .input-group-formal:focus-within {
        border-color: #0080ff;
        box-shadow: 0 0 0 3px rgba(0, 128, 255, 0.12);
    }

    .input-group-formal i {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .input-group-formal .form-control-formal {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        color: var(--text-main) !important;
        outline: none !important;
        width: 100%;
        font-size: 0.9rem;
        padding: 12px 10px !important;
        height: auto !important;
    }

    body.light-theme .input-group-formal .form-control-formal {
        color: #1e293b !important;
    }

    /* Password eye icon */
    .password-toggle {
        cursor: pointer;
        color: var(--text-muted);
        padding-left: 8px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
    }

    .password-toggle:hover {
        color: var(--text-main);
    }

    /* Formal Buttons */
    .btn-submit-formal {
        background: #0080ff;
        color: #ffffff !important;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        border: none;
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 4px 12px rgba(0, 128, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-submit-formal:hover {
        background: #0066cc;
        transform: translateY(-1.5px);
        box-shadow: 0 6px 16px rgba(0, 128, 255, 0.25);
    }

    .btn-submit-admin {
        background: #6366f1;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    .btn-submit-admin:hover {
        background: #4f46e5;
        box-shadow: 0 6px 16px rgba(99, 102, 241, 0.25);
    }

    /* Mobile Responsive Optimizations */
    @media (max-width: 576px) {
        .auth-container {
            padding: 30px 0;
            min-height: auto;
        }
        .flip-container {
            padding: 0 12px;
        }
        .auth-form-container {
            padding: 30px 20px;
        }
        .flip-card-inner {
            height: 440px; /* Snug, clean fit preventing vertical overflow */
        }
        .form-group {
            margin-bottom: 16px;
        }
        .btn-submit-formal {
            padding: 12px;
        }
    }
</style>

<div class="auth-container">
    <div class="container" style="position: relative; z-index: 5;">
        <div class="flip-container" id="flipContainer">
            <div class="flip-card-inner" id="flipCardInner">
                
                <!-- ================= FRONT SIDE (USER) ================= -->
                <div class="flip-card-front">
                    <div class="auth-form-container">
                        <div class="text-center mb-4">
                            <h4 class="font-weight-bold" style="font-family: 'Outfit', sans-serif;">User Sign In</h4>
                            <p class="text-muted extra-small">Access clinical diagnostic platform</p>
                        </div>

                        <form method="POST" action="{% url 'UserLogin' %}">
                            {% csrf_token %}
                            <input type="hidden" name="role" value="user">

                            <div class="form-group">
                                <label class="form-label-formal">Login ID</label>
                                <div class="input-group-formal">
                                    <i class="far fa-user"></i>
                                    <input type="text" name="loginid" class="form-control-formal" placeholder="Enter your Login ID" required>
                                </div>
                            </div>

                            <div class="form-group mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label-formal mb-0">Password</label>
                                    <a href="{% url 'ForgotPassword' %}" class="text-muted extra-small text-decoration-none hover-underline">Forgot Password?</a>
                                </div>
                                <div class="input-group-formal">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" name="pswd" id="passwordInputUser" class="form-control-formal" placeholder="Enter your password" required>
                                    <span class="password-toggle" onclick="togglePassword('passwordInputUser', this)">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <button type="submit" class="btn-submit-formal mt-3">
                                Sign In <i class="fas fa-sign-in-alt" style="font-size: 0.85rem;"></i>
                            </button>

                            <div class="d-flex justify-content-between align-items-center mt-4" style="font-size: 0.8rem;">
                                <span class="text-muted">New user? <a href="{% url 'UserRegisterForm' %}" class="text-primary font-weight-bold hover-underline">Register</a></span>
                                <button type="button" class="btn btn-link p-0 text-muted hover-underline" style="font-size: 0.8rem; font-weight: 500; outline: none; box-shadow: none;" onclick="flipCard(true)">
                                    Admin Access <i class="fas fa-arrow-right ml-1"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- ================= BACK SIDE (ADMIN) ================= -->
                <div class="flip-card-back">
                    <div class="auth-form-container">
                        <div class="text-center mb-4">
                            <h4 class="font-weight-bold" style="font-family: 'Outfit', sans-serif; color: #818cf8;">Administrator</h4>
                            <p class="text-muted extra-small">Access global oversight & management dashboard</p>
                        </div>

                        <form method="POST" action="{% url 'UserLogin' %}">
                            {% csrf_token %}
                            <input type="hidden" name="role" value="admin">

                            <div class="form-group">
                                <label class="form-label-formal">Admin ID</label>
                                <div class="input-group-formal">
                                    <i class="far fa-user"></i>
                                    <input type="text" name="loginid" class="form-control-formal" placeholder="Enter Administrator ID" required>
                                </div>
                            </div>

                            <div class="form-group mb-4">
                                <label class="form-label-formal">Password</label>
                                <div class="input-group-formal">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" name="pswd" id="passwordInputAdmin" class="form-control-formal" placeholder="Enter Password" required>
                                    <span class="password-toggle" onclick="togglePassword('passwordInputAdmin', this)">
                                        <i class="fas fa-eye"></i>
                                    </span>
                                </div>
                            </div>

                            <button type="submit" class="btn-submit-formal btn-submit-admin mt-3">
                                Access Dashboard <i class="fas fa-lock" style="font-size: 0.85rem;"></i>
                            </button>

                            <div class="d-flex justify-content-between align-items-center mt-4" style="font-size: 0.8rem;">
                                <button type="button" class="btn btn-link p-0 text-muted hover-underline" style="font-size: 0.8rem; font-weight: 500; outline: none; box-shadow: none;" onclick="flipCard(false)">
                                    <i class="fas fa-arrow-left mr-1"></i> User Sign In
                                </button>
                                <span class="text-muted small">Secure Admin Channel</span>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function flipCard(shouldFlip) {
        const cardInner = document.getElementById('flipCardInner');
        if (shouldFlip) {
            cardInner.classList.add('flipped');
        } else {
            cardInner.classList.remove('flipped');
        }
    }

    function togglePassword(inputId, toggleEl) {
        const input = document.getElementById(inputId);
        const icon = toggleEl.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
