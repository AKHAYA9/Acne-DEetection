{% extends 'base.html' %}
{% block contents %}
<style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; padding: 40px 0; }
    .auth-card { 
        width: 100%; 
        max-width: 400px; 
        margin: 0 auto; 
        border-radius: 24px; 
        overflow: hidden; 
        background: rgba(30, 41, 59, 0.6); 
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: var(--shadow-lg); 
    }
    .auth-form-container { flex: 1; padding: 40px; background: transparent; }
    .btn-premium { background: var(--brand-secondary); color: white; border-radius: 12px; border: none; font-weight: 600; transition: all 0.3s ease; }
    .btn-premium:hover { background: var(--brand-primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3); color: #0f172a; }
    
    .otp-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
    .otp-box { 
        width: 45px; 
        height: 55px; 
        text-align: center; 
        font-size: 1.5rem; 
        font-weight: 700; 
        border-radius: 12px; 
        border: 2px solid rgba(255, 255, 255, 0.1); 
        background: rgba(15, 23, 42, 0.5);
        color: white;
        transition: all 0.2s ease;
        padding: 0;
    }
    .otp-box:focus {
        border-color: var(--brand-primary);
        box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.1);
        outline: none;
        background: rgba(15, 23, 42, 0.8);
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="auth-card premium-card animate-up">
            <div class="auth-form-container w-100">
                <div class="text-center mb-4">
                    <h4 class="font-weight-bold">Verify OTP</h4>
                    <p class="text-muted extra-small">Enter the 6-digit code sent to your email</p>
                </div>

                <form method="POST" action="{% url 'VerifyOTP' %}" id="otpForm">
                    {% csrf_token %}
                    
                    <div class="form-group mb-2">
                        <label class="extra-small font-weight-bold text-muted ml-1">6-DIGIT SECURITY CODE</label>
                        <div class="otp-container mt-2">
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required autofocus>
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required>
                            <input type="text" class="otp-box" maxlength="1" pattern="\d" required>
                        </div>
                        <input type="hidden" name="otp" id="hiddenOtp">
                    </div>

                    <button type="submit" class="btn-premium w-100 py-2 mb-3">Verify Code</button>

                    <div class="text-center">
                        <a href="{% url 'ForgotPassword' %}" class="text-muted small">Didn't receive it? Request a new one</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const otpBoxes = document.querySelectorAll('.otp-box');
    const hiddenOtp = document.getElementById('hiddenOtp');
    const otpForm = document.getElementById('otpForm');

    otpBoxes.forEach((box, index) => {
        box.addEventListener('input', (e) => {
            // Only allow digits
            box.value = box.value.replace(/[^0-9]/g, '');
            
            // Move to next box if filled
            if (box.value !== '' && index < otpBoxes.length - 1) {
                otpBoxes[index + 1].focus();
            }
        });

        box.addEventListener('keydown', (e) => {
            // Move to previous box on backspace if current is empty
            if (e.key === 'Backspace' && box.value === '' && index > 0) {
                otpBoxes[index - 1].focus();
            }
        });
        
        // Handle paste event
        box.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
            if (pasteData.length > 0) {
                for (let i = 0; i < pasteData.length; i++) {
                    if (otpBoxes[index + i]) {
                        otpBoxes[index + i].value = pasteData[i];
                        if (index + i < otpBoxes.length - 1) {
                            otpBoxes[index + i + 1].focus();
                        } else {
                            otpBoxes[index + i].focus();
                        }
                    }
                }
            }
        });
    });

    otpForm.addEventListener('submit', (e) => {
        let otpValue = '';
        otpBoxes.forEach(box => {
            otpValue += box.value;
        });
        hiddenOtp.value = otpValue;
    });
</script>
{% endblock %}
